# =========================================
# 1. 核心基础参数与 Mihomo 狂暴性能优化-
# =========================================
port: 7897
socks-port: 7891
mixed-port: 7893
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
secret: ""

# --- 极致秒开参数 ---
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

profile:
  store-selected: true
  store-fake-ip: true

geodata-mode: true
geodata-loader: memconservative  # 优化内存占用
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"
  mmdb: "https://github.com/Hackl0us/GeoIP2-CN/releases/latest/download/Country.mmdb"

# =========================================
# 2. 网络接管 (TUN 与 Sniffer)
# =========================================
tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  gso: true
  gso-max-size: 65536

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, '8080-8880']
    QUIC:
      ports: [443, 8443]
  # 移除了流媒体，只保留基础大厂嗅探
  force-domain:
    - '+.google.com'
    - '+.youtube.com'
    - '+.facebook.com'
  skip-domain:
    - 'Mijia Cloud'

# =========================================
# 3. 海外纯净极速 DNS (无国内污染防线)
# =========================================
dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  prefer-h3: false
  cache-algorithm: arc

  # 全面拥抱国际顶级公共 DNS
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  
  # 必须保留，供解析节点使用防崩溃
  proxy-server-nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

  fake-ip-filter-mode: rule
  fake-ip-filter:
    - GEOSITE,private,real-ip
    - DOMAIN-SUFFIX,msftconnecttest.com,real-ip
    - DOMAIN-SUFFIX,msftncsi.com,real-ip
    - DOMAIN,captive.apple.com,real-ip
    - DOMAIN-WILDCARD,time.*.com,real-ip
    - DOMAIN-WILDCARD,time.*.gov,real-ip
    - DOMAIN-WILDCARD,ntp.*.com,real-ip
    - MATCH,fake-ip

# =========================================
# 4. 节点提供者 (Sub-Store)
# =========================================
proxy-providers:
  All:
    type: http
    url: "https://gist.githubusercontent.com/AStarStory/3523c833b7e92e87eeda820f2555a837/raw/Keliang"
    interval: 86400
    path: ./all.yaml
    health-check:
      enable: true
      interval: 600
      url: "https://www.gstatic.com/generate_204"

# =========================================
# 5. 极简策略组 (专为海外开放网络定制)
# =========================================
proxy-groups:
  - name: 节点选择
    type: select
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/adjust.svg
    use: [All]
    proxies: [DIRECT, 香港节点, 美国节点, 日本节点, 台湾节点, 新加坡节点]

  # 纯净的手动选节点层
  - name: 手动选择
    type: select
    icon: https://www.clashverge.dev/assets/icons/link.svg
    use: [All]

  # --- 基础国家筛选组 ---
  - name: 香港节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    use: [All]
    filter: 港|🇭🇰|HK|(?i)Hong
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
  - name: 美国节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
    use: [All]
    filter: 美|洛杉矶|🇺🇸|US|(?i)States|American
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
  - name: 日本节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    use: [All]
    filter: 日|东京|🇯🇵|JP|(?i)Japan
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
  - name: 台湾节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    use: [All]
    filter: 台|🇹🇼|TW|(?i)Taiwan
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
  - name: 新加坡节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    use: [All]
    filter: 新加坡|🇸🇬|SG|(?i)Singapore
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  # --- 核心应用组 ---
  - name: AI合集
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/63be653774a6a83cd8e475a7b65f1ed68b9a0093/IconSet/Color/AI.png
    # 第一顺位保留 DIRECT，嵌套手动选择，并备齐常用跨区节点
    proxies: [DIRECT, 手动选择, 节点选择, 美国节点, 日本节点, 台湾节点, 新加坡节点, 香港节点]

  - name: 漏网之鱼
    type: select
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/fish.svg
    proxies: [DIRECT, 节点选择, 手动选择]

# =========================================
# 6. 第三方规则集引用 (极其干净)
# =========================================
rule-providers:
  AI:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/iab0x00/ProxyRules/main/Rule/AI.txt"
    path: ./ruleset/AI.txt
    interval: 86400

# =========================================
# 7. 终极极简路由规则
# =========================================
rules:
  # --- 1. 进程级白名单 ---
  - PROCESS-NAME,SunloginClient.exe,DIRECT
  - PROCESS-NAME,ToDesk.exe,DIRECT
  - PROCESS-NAME,TeamViewer.exe,DIRECT
  - PROCESS-NAME,wemeetapp.exe,DIRECT
  - PROCESS-NAME,tailscaled.exe,DIRECT
  - PROCESS-NAME,zerotier-one.exe,DIRECT

  # --- 2. 局域网优先直连 ---
  - GEOSITE,private,DIRECT
  - GEOIP,LAN,DIRECT
  
# 👇 3.为你量身定制的 8.155.3.90
  - DOMAIN-SUFFIX,lege.jishutech.cn,香港节点
  - IP-CIDR,8.155.3.90/32,香港节点

  # --- 4. 专属应用映射 ---
  - RULE-SET,AI,AI合集

  # --- 5. 泛域名全直连 (海外网络环境优势) ---
  - GEOSITE,cn,DIRECT
  - GEOSITE,geolocation-!cn,DIRECT
  - GEOIP,CN,DIRECT

  # --- 6. 终极兜底 ---
  - MATCH,漏网之鱼
