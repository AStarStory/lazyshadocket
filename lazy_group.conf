[Host]
# 作用：
# 这里只影响域名解析方式，不是分流规则
# 苹果相关域名交给系统 DNS，通常更稳
*.apple.com = server:system
*.icloud.com = server:system

# 本机回环地址
localhost = 127.0.0.1
