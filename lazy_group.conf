# =========================================
# 地区节点自动筛选组
# 说明：
# 仅香港 / 日本 / 新加坡 / 美国 这四组剔除带 1X 的节点
# 其余地区组保持普通筛选，不变
# =========================================

# 香港：地区匹配，但排除 1X
香港节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=^(?!.*(?:1X|1x)).*(🇭🇰|HK|Hong|hong|Hong Kong|香港|深港|沪港|京港|港).*$

# 保持原样
台湾节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=🇹🇼|TW|TWN|Taiwan|taiwan|Taipei|台湾|台灣|台北|台中|新北|彰化

# 日本：地区匹配，但排除 1X
日本节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=^(?!.*(?:1X|1x)).*(🇯🇵|JP|Japan|japan|Tokyo|tokyo|日本|东京|大阪|京日|苏日|沪日|上日|川日|深日|广日).*$

# 新加坡：地区匹配，但排除 1X
新加坡节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=^(?!.*(?:1X|1x)).*(🇸🇬|SG|Sing|sing|Singapore|新加坡|狮城|沪新|京新|深新|杭新|广新).*$

# 保持原样
韩国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=🇰🇷|KR|Korea|korea|KOR|韩国|首尔|韓|春川

# 美国：地区匹配，但排除 1X
美国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=^(?!.*(?:1X|1x)).*(🇺🇸|US|USA|America|america|United States|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美).*$

# 以下全部保持原样
英国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=🇬🇧|UK|United Kingdom|Britain|England|英国|伦敦
德国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=🇩🇪|DE|Germany|germany|德国|法兰克福
法国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=🇫🇷|FR|France|france|法国|巴黎
马来西亚节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=🇲🇾|MY|Malaysia|malaysia|马来西亚|吉隆坡
土耳其节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=🇹🇷|TR|Turkey|turkey|土耳其|伊斯坦布尔
越南节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=0,timeout=5,select=0,policy-regex-filter=🇻🇳|VN|Vietnam|vietnam|越南|胡志明|河内


